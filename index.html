<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Spacefaring News. The last frontier, the call of the void"
    />
    <title>Spacefaring News</title>
  </head>
  <body>
    <div class="wrap">
      <header class="site">
        <p><a class="brand" href="/">Spacefaring News</a></p>
        <nav class="site-nav">
          <a href="#dispatch">Dispatch</a>
          <a href="#preview">Latest</a>
          <a href="https://spacefaring-news.pages.dev">Archive</a>
        </nav>
      </header>

      <main>
        <p class="eyebrow">SPACEFARING</p>
        <h1>Spacefaring News</h1>
        <p class="lede">The last frontier, the call of the void</p>

      <section id="dispatch" class="signup blog-card" aria-labelledby="signup-title">
        <div>
          <h2 id="signup-title">Board the ship</h2>
        </div>

        <form
          hx-post="/api/subscribe"
          hx-target="#signup-result"
          hx-swap="innerHTML"
        >
          <label for="email">Email address</label>
          <div class="form-row">
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
            <button type="submit">Subscribe</button>
          </div>
        </form>
      </section>

      <section id="signup-result" class="result" aria-live="polite">
        <p>NET: Tonight</p>
      </section>
      </main>

      <footer class="site">
        <p>2026 - Spacefaring News</p>
      </footer>
    </div>
    <script src="/htmx.min.js"></script>
  </body>
</html>
